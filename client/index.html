<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Max Mullokandov - Full Stack Developer</title>
    <meta name="description" content="Full Stack Developer specializing in React, TypeScript, Java Spring, and Node.js. CS graduate from The Open University of Israel." />
    <!-- Favicon -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://maxmullo.com" />
    <meta property="og:title"       content="Max Mullokandov - Full Stack Developer" />
    <meta property="og:description" content="Full Stack Developer specializing in React, TypeScript, Java Spring, and Node.js. CS graduate from The Open University of Israel." />
    <meta property="og:image"       content="https://maxmullo.com/max-profile.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Max Mullokandov - Full Stack Developer" />
    <meta name="twitter:description" content="Full Stack Developer specializing in React, TypeScript, Java Spring, and Node.js." />
    <meta name="twitter:image"       content="https://maxmullo.com/max-profile.png" />
    <!-- Prevent flash of wrong theme before React mounts -->
    <script>
      (function () {
        var stored = localStorage.getItem('portfolio-theme');
        var theme = stored === 'light' ? 'light' : 'dark';
        document.documentElement.classList.add(theme);
      })();
    </script>
    <!-- Fonts are self-hosted via @fontsource-variable (see main.tsx) -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
